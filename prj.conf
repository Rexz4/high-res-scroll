# Basic Hardware
CONFIG_GPIO=y
CONFIG_I2C=y
CONFIG_NRFX_TWIM=y

# Enable Serial Console
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Floating point support for sensitivity calculations
CONFIG_FPU=y
CONFIG_CBPRINTF_FP_SUPPORT=y

# Pro Micro nRF52840 Specs
CONFIG_BUILD_OUTPUT_UF2=y
CONFIG_FLASH_LOAD_OFFSET=0x26000